<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Teleprompter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    #controls { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 10px; display: flex; gap: 10px; align-items: center; }
    #content { margin-top: 60px; padding: 24px; font-size: 40px; line-height: 1.5; }
    textarea { width: 100%; height: 150px; }
    button { padding: 8px 12px; border: 0; background: #0ea5e9; color: #fff; border-radius: 6px; cursor: pointer; }
    input[type="range"] { width: 200px; }
    label { font-size: 14px; color: #ccc; }
  </style>
</head>
<body>
  <div id="controls">
    <button onclick="toggle()">Iniciar/Pausar</button>
    <label>Velocidade <input id="speed" type="range" min="0" max="10" step="0.5" value="2"></label>
    <label>Tamanho <input id="size" type="range" min="24" max="96" step="2" value="40"></label>
    <button onclick="mirror()">Espelhar</button>
    <button onclick="resetScroll()">Topo</button>
  </div>
  <div id="content"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const initial = params.get('text') || '';
    const contentEl = document.getElementById('content');
    let playing = false;
    let raf = null;
    let mirrored = false;
    let text = initial;

    function setText(t) {
      text = t || '';
      contentEl.innerText = text;
    }
    setText(initial);

    document.getElementById('size').addEventListener('input', e => {
      contentEl.style.fontSize = e.target.value + 'px';
    });

    function step() {
      if (!playing) return;
      const speed = parseFloat(document.getElementById('speed').value);
      window.scrollBy(0, speed);
      raf = requestAnimationFrame(step);
    }
    function toggle() {
      playing = !playing;
      if (playing) step(); else cancelAnimationFrame(raf);
    }
    function mirror() {
      mirrored = !mirrored;
      contentEl.style.transform = mirrored ? 'scaleX(-1)' : 'none';
    }
    function resetScroll() {
      window.scrollTo(0, 0);
    }
    window.addEventListener('keydown', e => {
      if (e.code === 'Space') toggle();
      if (e.code === 'ArrowUp') window.scrollBy(0, -60);
      if (e.code === 'ArrowDown') window.scrollBy(0, 60);
    });
  </script>
</body>
</html>
